<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HJS!</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#000;
  --panel:#0c0c0d;
  --border-hi:rgba(255,255,255,0.09);
  --border-lo:rgba(255,255,255,0.02);
  --tx0:#d4d8e0;--tx1:#606672;--tx2:#363b45;
  --ac:#5b9bd5;--ac-light:#7fb3e0;--ac-dim:rgba(91,155,213,0.07);--ac-mid:#4a86bb;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --sans:'Inter',-apple-system,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}

body{
  height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;
  overflow:hidden;font-family:var(--sans);user-select:none;position:relative;
}

/* 배경 비디오 */
#bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-1;
  filter:brightness(0.03) saturate(0);
}

#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}

.cursor-light{
  position:fixed;width:280px;height:280px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(91,155,213,0.055) 0%,transparent 70%);
  transform:translate(-50%,-50%);z-index:2;mix-blend-mode:screen;opacity:0;
  transition:opacity .4s;
}
.flash{
  position:fixed;inset:0;
  background:radial-gradient(circle at center,rgba(91,155,213,0.2),transparent 65%);
  opacity:0;pointer-events:none;z-index:100;
}

/* ── 타이틀 ── */
.main-title{
  font-family:var(--mono);
  font-size:54px;font-weight:700;letter-spacing:16px;
  color:rgba(255,255,255,0.88);
  text-align:center;line-height:1;margin-bottom:48px;
  position:relative;z-index:3;
  animation:titleIn .9s cubic-bezier(.16,1,.3,1) both;
}
.main-title .hjs-text{
  display:block;font-family:var(--mono);
  font-size:32px;font-weight:300;letter-spacing:10px;
  color:rgba(255,255,255,0.2);margin-top:7px;
}
@keyframes titleIn{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

/* ══════════════════════════════════════════
   로그인 박스 — 검정 무광 + 천 재질 + 입체
   ══════════════════════════════════════════ */
.login-box{
  width:364px;padding:38px 32px;
  position:relative;z-index:3;text-align:center;
  border-radius:10px;

  /* 무광 블랙 패브릭 느낌 베이스 */
  background:
    /* 노이즈 텍스처 (SVG 필터 대신 CSS 패턴으로 구현) */
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.012) 0px,
      transparent 1px,
      transparent 3px,
      rgba(255,255,255,0.006) 3px,
      transparent 4px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.008) 0px,
      transparent 1px,
      transparent 3px
    ),
    linear-gradient(
      160deg,
      #141416 0%,
      #0c0c0e 40%,
      #101012 100%
    );

  /* 베젤: 위·왼쪽은 약간 밝게, 아래·오른쪽은 어둡게 */
  border-top:   1px solid rgba(255,255,255,0.11);
  border-left:  1px solid rgba(255,255,255,0.07);
  border-right: 1px solid rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(0,0,0,0.7);

  /* 입체 효과:
     - inset 상단 하이라이트 (빛 반사)
     - 오른쪽-아래 하드 그림자 (솟아있는 느낌)
     - 퍼지는 주변 그림자 */
  box-shadow:
    inset 0 1px 0   rgba(255,255,255,0.08),
    inset 0 -1px 0  rgba(0,0,0,0.4),
    5px  7px 0   #000,
    8px  12px 28px rgba(0,0,0,0.85),
    16px 20px 48px rgba(0,0,0,0.5),
    0 0 60px rgba(91,155,213,0.03);

  animation:boxIn 1s cubic-bezier(.16,1,.3,1) .12s both;
  transition:opacity .7s,transform .7s;
}

/* 상단 미세 하이라이트 선 */
.login-box::before{
  content:"";
  position:absolute;top:0;left:14%;right:14%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  border-radius:1px;
}

/* 우측 하단 코너 — 깊이감 강조 */
.login-box::after{
  content:"";
  position:absolute;bottom:-3px;right:-3px;
  width:80%;height:80%;
  border-right:1px solid rgba(255,255,255,0.02);
  border-bottom:1px solid rgba(255,255,255,0.02);
  border-radius:0 0 12px 0;
  pointer-events:none;
}

.login-box.success{opacity:0;transform:translateY(-18px) scale(.95);}

@keyframes boxIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.login-title{
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:4px;text-transform:uppercase;color:var(--tx2);
  margin-bottom:26px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.login-title::before,.login-title::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.05);}

/* 입력창 — 눌린(inset) 느낌 */
.login-box input{
  width:100%;padding:11px 13px;margin-bottom:9px;
  border-radius:6px;
  border-top:   1px solid rgba(0,0,0,0.6);
  border-left:  1px solid rgba(0,0,0,0.4);
  border-right: 1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.04);
  background:rgba(0,0,0,0.55);
  color:rgba(255,255,255,0.82);
  outline:none;
  font-family:var(--mono);font-size:13px;letter-spacing:1px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);
  transition:border-color .2s,box-shadow .2s;
}
.login-box input::placeholder{color:var(--tx2);font-family:var(--sans);letter-spacing:0;font-size:12px;}
.login-box input:focus{
  border-color:rgba(91,155,213,0.3);
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.4),0 0 0 2px rgba(91,155,213,0.08);
}

/* ENTER 버튼 — 살짝 솟은 느낌 */
.gold-btn{
  width:100%;padding:12px;margin-top:6px;
  border:none;border-radius:6px;
  font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:4px;
  cursor:pointer;color:#fff;
  background:linear-gradient(180deg,#6aaee0 0%,var(--ac) 60%,#4a86bb 100%);
  box-shadow:
    0 3px 0 #2e5f8a,
    0 5px 14px rgba(91,155,213,0.22),
    inset 0 1px 0 rgba(255,255,255,0.15);
  position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .12s;
}
.gold-btn:hover{
  background:linear-gradient(180deg,#7bbde8 0%,#6aaee0 60%,#5592cc 100%);
  box-shadow:0 3px 0 #2e5f8a,0 8px 20px rgba(91,155,213,0.28),inset 0 1px 0 rgba(255,255,255,0.18);
}
.gold-btn:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 #2e5f8a,0 3px 8px rgba(91,155,213,0.15),inset 0 1px 0 rgba(255,255,255,0.1);
}
.gold-btn::before{
  content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
  transition:.5s;
}
.gold-btn:hover::before{left:100%;}

/* 비회원 버튼 */
.guest-btn{
  width:100%;padding:11px;margin-top:8px;
  border:1px solid rgba(255,255,255,0.06);border-radius:6px;
  font-family:var(--mono);font-size:12px;font-weight:400;letter-spacing:2px;
  cursor:pointer;
  background:rgba(255,255,255,0.02);
  color:var(--tx1);
  transition:all .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
}
.guest-btn:hover{border-color:rgba(91,155,213,0.22);color:var(--ac-light);background:var(--ac-dim);}
.guest-btn:active{transform:scale(.99);}

.signup-link{margin-top:14px;font-size:10px;text-align:center;color:var(--tx2);}
.signup-link a{color:var(--tx1);text-decoration:none;cursor:pointer;font-family:var(--mono);letter-spacing:1px;transition:color .2s;}
.signup-link a:hover{color:var(--ac-light);}
#message{margin-top:12px;font-size:12px;font-weight:500;min-height:18px;font-family:var(--mono);letter-spacing:.5px;}

@media(max-width:1024px){
  .main-title{font-size:40px;letter-spacing:11px;margin-bottom:36px;}
  .main-title .hjs-text{font-size:26px;letter-spacing:7px;}
  .login-box{width:min(84vw,330px);padding:26px 22px;}
}
@media(max-width:480px){
  .main-title{font-size:30px;letter-spacing:7px;margin-bottom:28px;}
  .main-title .hjs-text{font-size:20px;letter-spacing:5px;}
  .login-box{width:88vw;padding:20px 16px;border-radius:8px;
    box-shadow:3px 5px 0 #000,6px 9px 20px rgba(0,0,0,0.8),0 0 40px rgba(91,155,213,0.02);}
  .login-box input{padding:10px 12px;font-size:12px;margin-bottom:8px;}
  .gold-btn,.guest-btn{padding:10px;font-size:11px;}
  .signup-link{font-size:9px;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://cdn.coverr.co/videos/coverr-golden-light-particles-1574/1080p.mp4" type="video/mp4">
</video>

<canvas id="particles"></canvas>

<h1 class="main-title">HJS<span class="hjs-text"></span></h1>
<!--<h1 class="main-title">Welcome to <span class="hjs-text">HJS</span></h1>-->
<!-- <h1 class="main-title"> <span class="hjs-text">H J S</span></h1> -->

<div class="login-box">
    <h2 class="login-title">Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="gold-btn" id="zxc">ENTER</button>
        <button type="button" class="guest-btn" id="guestBtn">비회원</button>

<script>
    const form        = document.getElementById("loginForm");
    const msg         = document.getElementById("message");
    const flash       = document.querySelector(".flash");
    const cursorLight = document.querySelector(".cursor-light");
    const box         = document.querySelector(".login-box");
    const clickSound  = document.getElementById("clickSound");
    const bgVideo     = document.getElementById("bg-video");
    
    function noAccess() {
        // alert("접근 권한이 없습니다.\n개별 연락 부탁드립니다.\n현재 서비스 개발이 진행 중인 관계로,\n**비회원 버튼**으로 안내해 드리겠습니다.\n\n- 한지성 올림");
        alert("현재 서비스 개발이 진행 중인 관계로,\n**비회원 버튼**으로 안내해 드리겠습니다.\n가급적 🖥️PC 접속을 권장합니다.\n\n- 한지성 올림");
}

document.addEventListener("mousemove", (e) => {
    cursorLight.style.left    = e.clientX + "px";
    cursorLight.style.top     = e.clientY + "px";
    cursorLight.style.opacity = "1";
});
document.addEventListener("mouseleave", () => cursorLight.style.opacity = "0");

const canvas = document.getElementById("particles");
const ctx    = canvas.getContext("2d");
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

function createParticles(count, x = canvas.width / 2, y = canvas.height / 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            size:          Math.random() * 4 + 1,
            speedX:        (Math.random() - 0.5) * 6,
            speedY:        (Math.random() - 0.5) * 6,
            life:          Math.random() * 100 + 50,
            angle:         Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.2,
            shape:         Math.random() > 0.5 ? "star" : "circle"
        });
    }
}

function drawStar(ctx, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        ctx.lineTo( Math.cos((18 + i*72) * Math.PI / 180) * r,  -Math.sin((18 + i*72) * Math.PI / 180) * r);
        ctx.lineTo( Math.cos((54 + i*72) * Math.PI / 180) * (r/2), -Math.sin((54 + i*72) * Math.PI / 180) * (r/2));
    }
    ctx.closePath();
    ctx.fill();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = "rgba(180,120,255,0.9)";
        if (p.shape === "star") drawStar(ctx, p.size);
        else { ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
        p.x += p.speedX;
        p.y += p.speedY;
        p.angle += p.rotationSpeed;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });
    requestAnimationFrame(animate);
}
animate();

form.addEventListener("submit", function(e) {
    e.preventDefault();
    clickSound.play();

    const id = document.getElementById("username").value;
    const pw = document.getElementById("password").value;

    //     createParticles(200);
    //     bgVideo.style.filter = "brightness(0.6) contrast(1.2)";
    //     alert("환영합니다!\n- 한지성 올림");
    //     window.location.href = 'welcome.html';
    // } else {
    //     msg.textContent = "잘못된 아이디 또는 비밀번호입니다.";
    //     // msg.textContent = "Hint: PC로 들어오셔야 합니다!";
    //     // msg.textContent = "잘못된 아이디 또는 비밀번호입니다.\nHint: PC로 들어오셔야 합니다!";
    //     msg.style.color = "#ff4444";
    // }
});

window.addEventListener("resize", () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
});
document.getElementById("zxc").addEventListener("click", function() {
    clickSound.play();
    bgVideo.style.filter = "brightness(0.6) contrast(1.2)";
    alert("현재 서비스 개발이 진행 중인 관계로,\n**비회원 버튼**으로 안내해 드리겠습니다.\n가급적 🖥️PC 접속을 권장합니다.\n\n- 한지성 올림");
});
document.getElementById("guestBtn").addEventListener("click", function() {
    clickSound.play();
    flash.style.opacity    = "1";
    flash.style.transition = "opacity 0.8s ease";
    setTimeout(() => { flash.style.opacity = "0"; }, 800);
    setTimeout(() => { box.classList.add("success"); }, 500);
    // createParticles(200);
    bgVideo.style.filter = "brightness(0.6) contrast(1.2)";
    // alert("환영합니다!\n\n- 한지성 올림");

    window.location.href = 'welcome.html';
});
</script>

</body>
</html>
