<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HJS!</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:   #0e0f11;
  --bg1:  #131417;
  --bg2:  #181a1e;
  --bg3:  #1e2025;
  --line: rgba(255,255,255,0.055);
  --tx0:  #dde1e7;
  --tx1:  #7c8290;
  --tx2:  #474c57;
  --ac:       #5b9bd5;
  --ac-light: #7fb3e0;
  --ac-dim:   rgba(91,155,213,0.09);
  --ac-glow:  rgba(91,155,213,0.15);
  --ac-mid:   #4a86bb;
  --border-soft: rgba(255,255,255,0.05);
  --mono:'JetBrains Mono','Fira Code',monospace;
  --sans:'Inter',-apple-system,sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}

body{
  height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  overflow:hidden;font-family:var(--sans);user-select:none;position:relative;
}

/* 미세 격자 */
body::after{
  content:"";position:fixed;inset:0;
  background-image:
    linear-gradient(var(--border-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--border-soft) 1px,transparent 1px);
  background-size:48px 48px;opacity:.5;pointer-events:none;z-index:0;
}

#bg-video{
  position:fixed;top:0;left:0;
  width:100%;height:100%;object-fit:cover;z-index:-1;
  filter:brightness(0.05) saturate(0.2);
}

#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}

.cursor-light{
  position:fixed;width:260px;height:260px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(91,155,213,0.09) 0%,transparent 70%);
  transform:translate(-50%,-50%);z-index:2;mix-blend-mode:screen;opacity:0;
  transition:opacity .3s ease;
}

.flash{
  position:fixed;inset:0;
  background:radial-gradient(circle at center,rgba(91,155,213,0.3),transparent 70%);
  opacity:0;pointer-events:none;z-index:100;
}

/* ── 타이틀 ── */
.main-title{
  font-family:var(--mono);
  font-size:58px;font-weight:700;
  letter-spacing:14px;
  color:var(--tx0);
  text-align:center;line-height:1;margin-bottom:42px;
  position:relative;z-index:3;
  animation:titleIn .8s ease both;
}
.main-title .hjs-text{
  font-family:var(--mono);
  font-size:38px;font-weight:300;
  letter-spacing:9px;color:var(--tx1);
  display:block;margin-top:5px;
}

@keyframes titleIn{
  from{opacity:0;transform:translateY(-16px);}
  to  {opacity:1;transform:translateY(0);}
}

/* ── 로그인 박스 ── */
.login-box{
  width:360px;padding:34px 30px;
  background:var(--bg1);border:1px solid var(--line);
  border-radius:14px;
  position:relative;z-index:3;text-align:center;
  animation:boxIn .9s ease .1s both;
  transition:opacity .7s ease,transform .7s ease;
  box-shadow:0 0 0 1px rgba(255,255,255,0.02),
             0 20px 56px rgba(0,0,0,0.5),
             0 0 40px rgba(91,155,213,0.04);
}
.login-box::before{
  content:"";position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(91,155,213,0.4),transparent);
}
.login-box.success{opacity:0;transform:scale(.88) translateY(-28px);}

@keyframes boxIn{
  from{opacity:0;transform:translateY(26px) scale(.97);}
  to  {opacity:1;transform:translateY(0) scale(1);}
}

.login-title{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;color:var(--tx2);
  margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.login-title::before,.login-title::after{content:"";flex:1;height:1px;background:var(--line);}

.login-box input{
  width:100%;padding:11px 13px;margin-bottom:9px;
  border-radius:8px;border:1px solid var(--line);
  background:var(--bg3);color:var(--tx0);outline:none;
  font-family:var(--mono);font-size:13px;letter-spacing:1px;
  transition:border-color .2s,box-shadow .2s;
}
.login-box input::placeholder{color:var(--tx2);font-family:var(--sans);letter-spacing:0;}
.login-box input:focus{
  border-color:rgba(91,155,213,0.4);
  box-shadow:0 0 0 3px rgba(91,155,213,0.07);
}

.gold-btn{
  width:100%;padding:11px;margin-top:4px;border:none;border-radius:8px;
  font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;
  cursor:pointer;
  background:var(--ac);color:#fff;
  position:relative;overflow:hidden;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(91,155,213,0.18);
}
.gold-btn:hover{background:var(--ac-mid);transform:translateY(-1px);box-shadow:0 8px 24px rgba(91,155,213,0.22);}
.gold-btn:active{transform:scale(.98);}
.gold-btn::before{
  content:"";position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);
  transition:.5s;
}
.gold-btn:hover::before{left:100%;}

.guest-btn{
  width:100%;padding:11px;margin-top:7px;
  border:1px solid var(--line);border-radius:8px;
  font-family:var(--mono);font-size:12px;font-weight:400;letter-spacing:2px;
  cursor:pointer;background:transparent;color:var(--tx1);
  transition:all .2s;
}
.guest-btn:hover{border-color:rgba(91,155,213,0.3);color:var(--ac-light);background:var(--ac-dim);transform:translateY(-1px);}
.guest-btn:active{transform:scale(.98);}

.signup-link{margin-top:14px;font-size:10px;text-align:center;color:var(--tx2);}
.signup-link a{color:var(--tx1);text-decoration:none;cursor:pointer;font-family:var(--mono);letter-spacing:1px;transition:color .2s;}
.signup-link a:hover{color:var(--ac-light);}

#message{margin-top:12px;font-size:12px;font-weight:500;min-height:18px;font-family:var(--mono);letter-spacing:.5px;}

@media(max-width:1024px){
  .main-title{font-size:42px;letter-spacing:10px;margin-bottom:32px;}
  .main-title .hjs-text{font-size:26px;letter-spacing:7px;}
  .login-box{width:min(82vw,330px);padding:26px 22px;}
}
@media(max-width:480px){
  .main-title{font-size:32px;letter-spacing:7px;margin-bottom:26px;}
  .main-title .hjs-text{font-size:20px;letter-spacing:5px;}
  .login-box{width:88vw;padding:20px 16px;border-radius:12px;}
  .login-box input{padding:10px 12px;font-size:12px;margin-bottom:8px;}
  .gold-btn,.guest-btn{padding:10px;font-size:11px;}
  .signup-link{font-size:9px;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

const canvas = document.getElementById("particles");
const ctx    = canvas.getContext("2d");
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

function createParticles(count, x = canvas.width / 2, y = canvas.height / 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            size:          Math.random() * 4 + 1,
            speedX:        (Math.random() - 0.5) * 6,
            speedY:        (Math.random() - 0.5) * 6,
            life:          Math.random() * 100 + 50,
            angle:         Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.2,
            shape:         Math.random() > 0.5 ? "star" : "circle"
        });
    }
}

function drawStar(ctx, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        ctx.lineTo( Math.cos((18 + i*72) * Math.PI / 180) * r,  -Math.sin((18 + i*72) * Math.PI / 180) * r);
        ctx.lineTo( Math.cos((54 + i*72) * Math.PI / 180) * (r/2), -Math.sin((54 + i*72) * Math.PI / 180) * (r/2));
    }
    ctx.closePath();
    ctx.fill();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = "rgba(180,120,255,0.9)";
        if (p.shape === "star") drawStar(ctx, p.size);
        else { ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
        p.x += p.speedX;
        p.y += p.speedY;
        p.angle += p.rotationSpeed;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });
    requestAnimationFrame(animate);
}
animate();
