/* ── Notion Dark Token System (index) ── */
:root {
  --bg:           #191919;
  --surface:      #252525;
  --surface2:     #2c2c2c;
  --border:       #373737;
  --border-soft:  rgba(55,55,55,0.6);

  --text-primary:   #e8e8e6;
  --text-secondary: #9b9b9b;
  --text-tertiary:  #555;

  --accent:       #7c3aed;
  --accent-light: #a78bfa;
  --accent-glow:  rgba(124,58,237,0.35);
  --accent-soft:  rgba(124,58,237,0.12);

  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-font-smoothing: antialiased; }

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  overflow: hidden;
  font-family: var(--font);
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  position: relative;
}

/* ── 비디오 배경 ── */
#bg-video {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  object-fit: cover;
  z-index: -4;
  filter: brightness(0.06) saturate(0.4);
  transition: filter 0.5s;
}

/* ── 파티클 캔버스 ── */
#particles {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  z-index: 1;
  pointer-events: none;
}

/* ── 커서 라이트 ── */
.cursor-light {
  position: fixed;
  width: 200px; height: 200px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%);
  transform: translate(-50%,-50%);
  z-index: 2;
  mix-blend-mode: screen;
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* ── 플래시 ── */
.flash {
  position: fixed; inset:0;
  background: radial-gradient(circle at center, rgba(124,58,237,0.7), transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}

/* ── 타이틀 ── */
.main-title {
  font-family: var(--mono);
  /* font-size: 42px; */
  font-size: 63px;
  font-weight: 700;
  letter-spacing: 10px;
  margin-bottom: 48px;
  color: var(--accent-light);
  text-align: center;
  line-height: 1.1;
  position: relative;
  z-index: 3;
  animation: titleIn .8s ease both;
}

.main-title .hjs-text {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 42px;
  letter-spacing: 10px;
  color: var(--text-primary);
}

@keyframes titleIn {
  from { opacity:0; transform:translateY(-20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── 로그인 박스 ── */
.login-box {
  width: 380px;
  padding: 40px 36px;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,
              0 24px 64px rgba(0,0,0,0.5),
              0 0 40px var(--accent-glow);
  text-align: center;
  position: relative;
  z-index: 3;
  animation: boxIn 1s ease .1s both;
  transition: opacity .8s ease, transform .8s ease;
}

.login-box.success {
  opacity: 0;
  transform: scale(0.85) translateY(-40px);
}

@keyframes boxIn {
  from { opacity:0; transform:translateY(32px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.login-title {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.login-title::before,
.login-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 입력 필드 ── */
.login-box input {
  width: 100%;
  padding: 13px 14px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-primary);
  outline: none;
  font-size: 14px;
  font-family: var(--mono);
  transition: border-color .2s, box-shadow .2s;
  letter-spacing: 1px;
}
.login-box input::placeholder {
  color: var(--text-tertiary);
  font-family: var(--font);
  letter-spacing: 0;
}
.login-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}

/* ── ENTER 버튼 ── */
.gold-btn {
  width: 100%;
  padding: 13px;
  margin-top: 4px;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 4px;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  position: relative;
  overflow: hidden;
  transition: background .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.gold-btn:hover  { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
.gold-btn:active { transform: scale(0.98); }
.gold-btn::before {
  content: "";
  position: absolute; top:0; left:-100%;
  width:100%; height:100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: .5s;
}
.gold-btn:hover::before { left:100%; }

/* ── 비회원 버튼 ── */
.guest-btn {
  width: 100%;
  padding: 13px;
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-weight: 500;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: background .2s, border-color .2s, color .2s, transform .15s;
}
.guest-btn:hover {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--accent-light);
  transform: translateY(-1px);
}
.guest-btn:active { transform: scale(0.98); }

/* ── 회원가입 링크 ── */
.signup-link {
  margin-top: 16px;
  font-size: 11px;
  text-align: center;
  color: var(--text-tertiary);
}
.signup-link a {
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: color .2s;
  font-family: var(--mono);
  letter-spacing: 1px;
}
.signup-link a:hover { color: var(--accent-light); }

/* ── 메시지 ── */
#message {
  margin-top: 14px;
  font-size: 13px;
  font-weight: 500;
  min-height: 20px;
  font-family: var(--mono);
  letter-spacing: .5px;
}

/* ── 반응형 ── */
@media (max-width: 1024px) {
  /* .main-title         { font-size: 28px; letter-spacing: 6px; margin-bottom: 36px; } */
  .main-title         { font-size: 50px; letter-spacing: 6px; margin-bottom: 36px; }
  .main-title .hjs-text { font-size: 28px; letter-spacing: 6px; }

@media (max-width: 480px) {

  .signup-link        { font-size: 10px; }
  #message            { font-size: 12px; }
}

const canvas = document.getElementById("particles");
const ctx    = canvas.getContext("2d");
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

function createParticles(count, x = canvas.width / 2, y = canvas.height / 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            size:          Math.random() * 4 + 1,
            speedX:        (Math.random() - 0.5) * 6,
            speedY:        (Math.random() - 0.5) * 6,
            life:          Math.random() * 100 + 50,
            angle:         Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.2,
            shape:         Math.random() > 0.5 ? "star" : "circle"
        });
    }
}

function drawStar(ctx, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        ctx.lineTo( Math.cos((18 + i*72) * Math.PI / 180) * r,  -Math.sin((18 + i*72) * Math.PI / 180) * r);
        ctx.lineTo( Math.cos((54 + i*72) * Math.PI / 180) * (r/2), -Math.sin((54 + i*72) * Math.PI / 180) * (r/2));
    }
    ctx.closePath();
    ctx.fill();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = "rgba(180,120,255,0.9)";
        if (p.shape === "star") drawStar(ctx, p.size);
        else { ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
        p.x += p.speedX;
        p.y += p.speedY;
        p.angle += p.rotationSpeed;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });
    requestAnimationFrame(animate);
}
animate();
